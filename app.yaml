# https://cloud.google.com/appengine/docs/standard/reference/app-yaml?tab=python

# application: bridgy-federated

# keep this in sync with the test job image's Python version in .circleci/config.yml!
runtime: python312

# default_expiration: 1h

# https://cloud.google.com/appengine/docs/standard/python3/runtime#entrypoint_best_practices
# https://gunicorn.org/reference/settings/
entrypoint: gunicorn --workers 2 --threads 15 --timeout 60 -b :$PORT app:app

# instance_class: F1

# Autoscaling: this service is heavily IO-bound (CPU is only ~1/15 of wall clock
# time), so CPU - not request throughput - is the binding scaler that sets our
# instance floor. min_pending_latency is how long a request may wait in the queue
# before GAE spins up a new instance; the default (~30ms) spawns far too aggressively
# for a bursty IO-bound workload and badly over-provisions us, so we tolerate up to
# 1s of queueing instead. max_idle_instances keeps just one cheap warm spare.
# max_concurrent_requests should stay roughly matched to total gunicorn threads
# (workers x threads); setting it well above that just hides queueing as request
# latency. target_throughput_utilization is effectively slack here since CPU, not
# throughput, is what scales us; target_cpu_utilization (default .6) is the real
# cost/latency lever - raising it runs instances hotter for fewer instances, which is
# relatively cheap latency-wise because IO wait dominates total latency.
#
# earlier background:
# https://github.com/snarfed/bridgy/issues/578
# https://github.com/snarfed/bridgy/issues/1051
automatic_scaling:
  max_instances: 100
  max_idle_instances: 1
  max_concurrent_requests: 40
  min_pending_latency: 1s
  target_cpu_utilization: .8
  target_throughput_utilization: .8

inbound_services:
- warmup

# Serverless VPC Access for Memorystore memcache
# https://cloud.google.com/vpc/docs/serverless-vpc-access
vpc_access_connector:
  name: projects/bridgy-federated/locations/us-central1/connectors/bridgy-fed

env_variables:
  DATASTORE_DB: us-single-region
  PDS_HOST: atproto.brid.gy
  PLC_HOST: plc.directory
  APPVIEW_HOST: api.bsky.app
  BGS_HOST: bsky.network
  MOD_SERVICE_HOST: mod.bsky.app
  MOD_SERVICE_DID: did:plc:ar7c4by46qjdydhdevvrndac
  MEMCACHE_HOST: '10.126.144.67'
  # ...or test against labeler.dholms.xyz / did:plc:vzxheqfwpbi3lxbgdh22js66

  # >- folds newlines into spaces, which arroba strips
  SUPPORTED_COLLECTIONS: >-
    app.bsky.actor.profile,
    app.bsky.feed.like,
    app.bsky.feed.post,
    app.bsky.feed.repost,
    app.bsky.graph.block,
    app.bsky.graph.follow,
    app.bsky.graph.listblock,
    chat.bsky.actor.declaration,
    community.lexicon.payments.webMonetization,
    site.standard.document,
    site.standard.publication

  # this disables blob refetching
  # BLOB_REFETCH_TYPES: ''

  # set to enable read only mode (eg during planned maintenance)
  # https://github.com/snarfed/bridgy-fed/issues/2458
  # READ_ONLY: true

  # https://github.com/googleapis/python-ndb/blob/c55ec62b5153787404488b046c4bf6ffa02fee64/google/cloud/ndb/utils.py#L78-L81
  # NDB_DEBUG: true

  DISABLE_GETREPO: true

handlers:

# static
- url: /static
  static_dir: static
  secure: always

- url: /oauth_dropins_static
  static_dir: oauth_dropins_static

- url: /fonts
  static_dir: oauth_dropins_fonts

- url: /favicon.ico
  static_files: static/favicon.ico
  upload: static/favicon.ico
  secure: always

- url: /robots.txt
  static_files: static/robots.txt
  upload: static/robots.txt
  secure: always

- url: /.well-known/security.txt
  static_files: static/security.txt
  upload: static/security.txt
  secure: always

# dynamic
- url: /admin/memcache/.*
  script: auto
  secure: always
  login: optional

- url: /admin/sequences/.*
  script: auto
  secure: always
  login: optional

- url: /admin/.*
  script: auto
  secure: always
  login: admin

- url: .*
  script: auto
  secure: always

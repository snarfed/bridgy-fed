# Main build and test pipeline.
#
# CircleCI automatically reads this file from our repo and uses it for
# configuration.
# https://circleci.com/docs/reference/configuration-reference/
version: 2.1


parameters:
  service:
    type: enum
    enum: ["hub", "default"]
    default: "default"
  deploy-flags:
    type: enum
    enum: ["--no-promote", "--no-stop-previous-version", ""]
    description: additional flags for gcloud app deploy
    default: ""


commands:
  install-gcloud:
    steps:
      - run:
          name: Install gcloud
          command: |
            # google-cloud-sdk: https://cloud.google.com/sdk/docs/install#deb
            echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
            curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
            sudo apt-get update
            sudo apt-get install -y apt-transport-https automake ca-certificates gnupg google-cloud-sdk libtool pkg-config

  auth-gcloud:
    steps:
      - run:
          name: Authenticate gcloud
          command: |
            echo $GCLOUD_SERVICE_KEY | gcloud auth activate-service-account --key-file=-
            gcloud config set project bridgy-federated


jobs:
  test:
    resource_class: large
    docker:
      # keep this Python version in sync with the runtimes in *.yaml!
      - image: cimg/python:3.12

    steps:
      - checkout

      - restore_cache:
          key: venv-7-{{ .Branch }}-{{ checksum "requirements.txt" }}

      - install-gcloud

      - run:
          name: Base dependencies for tests
          command: |
            sudo apt-get install -y google-cloud-cli-firestore-emulator openjdk-21-jre-headless

      - run:
          name: Python dependencies
          command: |
            pip install -U pip flake8
            pip -V
            # make sure we install these at head, below
            pip uninstall -y arroba brevity dag-json granary lexrpc oauth-dropins
            pip install -U -r requirements.txt
            pip install pytest pytest-xdist pytest-cov coveralls
            ln -sf `pyenv prefix`/lib/python3.12/site-packages/oauth_dropins/fonts oauth_dropins_fonts
            ln -sf `pyenv prefix`/lib/python3.12/site-packages/oauth_dropins/static oauth_dropins_static

      - save_cache:
          key: venv-7-{{ .Branch }}-{{ checksum "requirements.txt" }}
          paths:
            - /home/circleci/.pyenv
            # Ideally we'd cache these, but they need root, and the cimg/python
            # Docker image's default user is circleci :/
            # https://github.com/cypress-io/circleci-orb/issues/269
            #
            # - /usr/lib/google-cloud-sdk
            # - /usr/lib/jvm/java-11-openjdk-amd64

      - run:
          name: Build and test
          command: |
            # base64 decodes to 32 bytes
            echo 1234567890123456789012345678901234657890123= > encrypted_property_key

            for port in 8089 8090 8091 8092; do
              CLOUDSDK_CORE_PROJECT=brid-gy gcloud emulators firestore start --host-port=:${port} --database-mode=datastore-mode < /dev/null >& /tmp/firestore-emulator.${port}.log &
            done
            sleep 3s

            pytest -n 4 --dist=worksteal --disable-warnings --cov=. --cov-config=.coveragerc tests/
            coverage html -d /tmp/coverage_html
            if [ "$COVERALLS_REPO_TOKEN" != "" ]; then coveralls || true; fi

            # check for unintentionally overridden test methods
            # https://flake8.pycqa.org/en/latest/user/error-codes.html#error-codes
            # https://flake8.pycqa.org/en/latest/user/options.html#cmdoption-flake8-select
            flake8 --select=F811 tests/test_*.py

      - store_artifacts:
          path: /tmp/coverage_html


  deploy-app:
    docker:
      - image: cimg/gcp:2026.02

    steps:
      - checkout
      - auth-gcloud
      - run:
          name: Deploy app
          command: |
            echo $ENCRYPTED_PROPERTY_KEY > encrypted_property_key
            echo $FLASK_SECRET_KEY > flask_secret_key
            echo $REPO_TOKEN > repo_token
            echo $THREADS_APP_ID > threads_app_id
            echo $THREADS_APP_SECRET > threads_app_secret
            echo $IFRAMELY_API_KEY_MD5 > iframely_api_key_md5

            # oauth-dropins static assets
            git clone --depth=1 https://github.com/snarfed/oauth-dropins.git ../oauth-dropins
            gcloud -q app deploy --no-cache --no-promote << pipeline.parameters.deploy-flags >> app.yaml


  deploy-router:
    docker:
      - image: cimg/gcp:2026.02

    steps:
      - checkout
      - auth-gcloud
      - run:
          name: Deploy router
          command: |
            echo $ENCRYPTED_PROPERTY_KEY > encrypted_property_key
            echo $FLASK_SECRET_KEY > flask_secret_key

            # oauth-dropins static assets
            git clone --depth=1 https://github.com/snarfed/oauth-dropins.git ../oauth-dropins

            # deploy router with min_num_instances equal to the current autoscaled
            # number, let it soak while we wait for tests, *then* drop it back
            # down to 1 in migrate-router.
            # https://github.com/snarfed/bridgy-fed/issues/1771
            # https://docs.cloud.google.com/appengine/docs/admin-api/reference/rest/v1/apps.services.versions
            ver=`gcloud app versions list --hide-no-traffic --service=router --format='value(id)'`
            instances=`gcloud app instances list --service=router --version=${ver} --format='value(id)' |wc -l`
            sed -E "s/min_num_instances: [0-9]+/min_num_instances: ${instances}/" < router.yaml > router.provisioned.yaml
            gcloud -q app deploy --no-promote << pipeline.parameters.deploy-flags >> index.yaml queue.yaml router.provisioned.yaml


  deploy-hub:
    docker:
      - image: cimg/gcp:2026.02

    steps:
      - checkout
      - auth-gcloud
      - run:
          name: Deploy hub
          command: |
            echo $ENCRYPTED_PROPERTY_KEY > encrypted_property_key
            echo $FLASK_SECRET_KEY > flask_secret_key

            # oauth-dropins static assets
            git clone --depth=1 https://github.com/snarfed/oauth-dropins.git ../oauth-dropins
            gcloud -q app deploy << pipeline.parameters.deploy-flags >> hub.yaml


  migrate-app:
    docker:
      - image: cimg/gcp:2026.02

    steps:
      - auth-gcloud
      - run:
          name: Migrate app traffic to new version
          command: |
            ver=$(gcloud app versions list --service=default --sort-by=~last_deployed_time --limit=1 --format='value(id)')
            echo Migrating all app traffic to $ver
            gcloud -q app versions migrate ${ver} --service=default


  migrate-router:
    docker:
      - image: cimg/gcp:2026.02

    steps:
      - auth-gcloud
      - run:
          name: Migrate router traffic to new version
          command: |
            ver=$(gcloud app versions list --service=router --sort-by=~last_deployed_time --limit=1 --format='value(id)')
            echo Migrating all router traffic to $ver
            gcloud -q app services set-traffic router --splits=${ver}=1

            # drop back to min_num_instances 1
            curl -X PATCH -H "Authorization: Bearer $(gcloud auth print-access-token)" -H 'Content-Type: application/json' --data '{"automaticScaling": {"minTotalInstances": 1}, "env": "flexible"}' "https://appengine.googleapis.com/v1/apps/bridgy-federated/services/router/versions/${ver}?updateMask=automaticScaling.minTotalInstances"


  stop-old-router-version:
    docker:
      - image: cimg/gcp:2026.02

    steps:
      - auth-gcloud
      - run:
          name: Stop previous router version
          command: |
            ver=$(gcloud app versions list --service=router --filter='traffic_split=0' --sort-by=~last_deployed_time --limit=1 --format='value(id)')
            if [[ -z "${ver}" ]]; then
              echo 'no non-serving router version found, skipping'
              exit 0
            fi

            echo Stopping old router version $ver
            gcloud -q app versions stop --service=router ${ver}


workflows:
  test-only:
    # full author_login value for dependabot as of 2026-03-10 is dependabot[bot]
    when: |
      pipeline.parameters.service == "default"
        and (pipeline.git.branch != "main"
             or pipeline.git.commit.author_login starts-with "dependabot")
    jobs:
      - test

  test-and-deploy-app-router:
    when: |
      pipeline.parameters.service == "default"
        and pipeline.git.branch == "main"
        and not (pipeline.git.commit.author_login starts-with "dependabot")

    jobs:
      - test
      - deploy-app
      - deploy-router

      - migrate-app:
          requires:
            - test: success
            - deploy-app: success

      - migrate-router:
          requires:
            - test: success
            - deploy-router: success

      - stop-old-router-version:
          requires:
            - deploy-router: success
            - migrate-router: terminal

  test-and-deploy-hub:
    when: |
      pipeline.parameters.service == "hub"
        and pipeline.git.branch == "main"

    jobs:
      - test
      # TODO: parallelize into deploy, migrate, and stop-old-version, like router
      # (can we parameterize stop-old-version across router and hub?)
      - deploy-hub:
          requires:
            - test: success
